<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโทรมาตร ลุ่มน้ำนครศรีธรรมราช</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap');
        
        * { font-family: 'Prompt', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.2); }

        .map-container { border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }

        .multiview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            padding: 12px;
            height: calc(100vh - 140px);
            overflow: hidden;
        }

        .camera-frame {
            border-radius: 10px;
            overflow: hidden;
            background: #0f172a;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            aspect-ratio: 16 / 9;
            min-height: 0;
        }
        .camera-frame:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
            transform: scale(1.01);
        }
        
        .camera-frame.sortable-ghost {
            opacity: 0.4;
            background: #1e293b;
            border-color: #64748b;
        }
        
        .camera-frame.sortable-drag {
            opacity: 0.9;
            box-shadow: 0 10px 30px rgba(34, 211, 238, 0.4);
            transform: scale(1.05) rotate(2deg);
            z-index: 1000;
        }
        
        .drag-handle {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: rgba(34, 211, 238, 0.8);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            font-size: 12px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .camera-frame:hover .drag-handle {
            opacity: 1;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }

        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .modal { animation: modalPop 0.4s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 14000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .fullscreen-overlay img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .fullscreen-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 48px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 14001;
        }
        .fullscreen-close:hover {
            background: rgba(255,0,0,0.7);
            transform: scale(1.1);
        }
        
        .active-layer { background: #0ea5e9; color: white; }
        
        /* Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.3) !important;
            border-radius: 16px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            color: #f1f5f9 !important;
        }
        .leaflet-popup-tip {
            background: rgba(15, 23, 42, 0.95) !important;
            border-top: 1px solid rgba(148, 163, 184, 0.3) !important;
        }
        .leaflet-popup-close-button {
            color: #94a3b8 !important;
            font-size: 24px !important;
        }
        .leaflet-popup-close-button:hover {
            color: #22d3ee !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="glass border-b border-slate-700 px-6 py-3 flex items-center justify-between z-50">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-sky-600 rounded-2xl flex items-center justify-center">
                <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" class="w-7 h-7">
            </div>
            <div>
                <h1 class="text-2xl font-bold">ระบบโทรมาตร</h1>
                <p class="text-sky-400 text-sm">ลุ่มน้ำนครศรีธรรมราช</p>
            </div>
        </div>

        <div id="thai-time" class="glass px-8 py-2 rounded-3xl text-center min-w-[360px]"></div>

        <div class="flex items-center gap-3">
            <div class="flex bg-slate-800 rounded-3xl p-1 text-sm font-medium">
                <button onclick="switchLayer(0)" id="btn-osm" class="px-5 py-2 rounded-3xl active-layer">🗺️ OSM</button>
                <button onclick="switchLayer(1)" id="btn-hybrid" class="px-5 py-2 rounded-3xl">🛰️ Hybrid</button>
            </div>

            <button onclick="toggleMultiview()" 
                    class="flex items-center gap-3 bg-gradient-to-r from-sky-500 to-blue-600 px-7 py-3 rounded-3xl font-semibold shadow-lg">
                📺 Multiview
            </button>

            <button onclick="toggleSidebar()" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center justify-center text-xl">☰</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="w-72 glass border-r border-slate-700 flex flex-col transition-all duration-300">
            <div class="p-5 border-b border-slate-600">
                <h2 class="font-semibold text-lg">📍 รายชื่อสถานี</h2>
            </div>
            <div id="station-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>

        <!-- Map -->
        <div class="flex-1 p-6">
            <div id="map" class="map-container w-full h-full"></div>
        </div>
    </div>

    <!-- MULTIVIEW MODAL -->
    <div id="multiview-modal" class="hidden fixed inset-0 bg-black/95 z-[12000] flex items-center justify-center p-6">
        <div class="glass w-full h-full max-w-[98%] max-h-[95vh] rounded-3xl overflow-hidden border border-slate-600 flex flex-col">
            
            <!-- Header ของ Multiview -->
            <div class="px-8 py-4 border-b border-slate-600 flex items-center justify-between bg-slate-950/70">
                <div class="flex items-center gap-4">
                    <span class="text-4xl">📺</span>
                    <div>
                        <h2 class="text-2xl font-bold">Multiview 4×4</h2>
                        <p class="text-slate-400 text-sm">ภาพกล้องสดทั้ง 13 สถานี</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div id="multi-time" class="font-mono text-emerald-400"></div>
                    <button onclick="refreshMultiview()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2.5 rounded-3xl text-sm font-medium">รีเฟรชภาพ</button>
                    <button onclick="toggleMultiview()" class="text-4xl leading-none text-slate-400 hover:text-white px-3">×</button>
                </div>
            </div>

            <!-- Grid กล้อง -->
            <div id="multiview-grid" class="multiview-grid flex-1 overflow-auto"></div>
        </div>
    </div>

    <!-- Single Image Modal -->
    <div id="image-modal" class="hidden fixed inset-0 bg-black/95 z-[13000] flex items-center justify-center p-6">
        <div class="modal glass max-w-5xl w-full rounded-3xl overflow-hidden">
            <div class="px-8 py-5 border-b border-slate-600 flex justify-between">
                <div class="flex items-center gap-4">
                    <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" class="w-9 h-9">
                    <div>
                        <span id="modal-code" class="font-mono text-2xl text-sky-400"></span>
                        <span id="modal-name" class="ml-4 text-2xl font-semibold"></span>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-slate-400 hover:text-white">×</button>
            </div>
            <div class="p-8 bg-black flex justify-center relative">
                <img id="modal-image" class="max-h-[78vh] rounded-2xl border border-slate-700 shadow-2xl cursor-pointer" 
                     onclick="toggleFullscreenImage()" title="คลิกเพื่อดูเต็มจอ">
            </div>
        </div>
    </div>

    <script>
        const stations = [
            { code: "TNA01", name: "ฝายบ้านตาล", lat: 8.430936, lng: 99.879033, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNA01/image.jpg" },
            { code: "TNA02", name: "คลองวัดหญ้า", lat: 8.476894, lng: 99.924250, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNA02/image.jpg" },
            { code: "TNA03", name: "ฝายท่าดี", lat: 8.391047, lng: 99.864547, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNB07/image.jpg" },
            { code: "TNA12", name: "บ้านปากพญา", lat: 8.483189, lng: 100.015408, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNB12/image.jpg" },
            { code: "TNA13", name: "บ้านหนองลุง", lat: 8.376106, lng: 99.878564, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNB13/image.jpg" },
            { code: "TNA15", name: "คลองท่าเรือ", lat: 8.357911, lng: 99.980492, img: "http://119.110.213.190/PPPCCTV/NAKORN/TNB15/image.jpg" },
            // ข้อมูลกล้องใหม่
            { code: "TC191705", name: "สะพานปากน้ำสิชล", lat: 9.00878, lng: 99.89003, img: "https://tele-nakhonsri.dwr.go.th/image/TC191705/CCTV_image/Staff_1.jpg" },
            { code: "TC191802", name: "สะพานบ้านโรงเหล็ก", lat: 8.73099, lng: 99.74612, img: "https://tele-nakhonsri.dwr.go.th/image/TC191802/CCTV_image/Staff_1.jpg" },
            { code: "TC191001", name: "สะพานข้ามแม่น้ำตาปี ตลาดฉวาง", lat: 8.42911, lng: 99.50842, img: "https://tele-nakhonsri.dwr.go.th/image/TC191001/CCTV_image/Staff_1.jpg" },
            { code: "TC191913", name: "สะพานคีรีวง", lat: 8.43248, lng: 99.78259, img: "https://tele-nakhonsri.dwr.go.th/image/TC191913/CCTV_image/Staff_1.jpg" },
            { code: "TC191911", name: "สะพานวัดท่าแพ", lat: 8.51459, lng: 99.95274, img: "https://tele-nakhonsri.dwr.go.th/image/TC191911/CCTV_image/Staff_1.jpg" },
            { code: "TC191912", name: "สะพานคลองท่าวัง", lat: 8.44410, lng: 99.95959, img: "https://tele-nakhonsri.dwr.go.th/image/TC191912/CCTV_image/Staff_1.jpg" },
            { code: "TC191918", name: "สะพานตลาดเชียรใหญ่", lat: 8.17389, lng: 100.14914, img: "https://tele-nakhonsri.dwr.go.th/image/TC191918/CCTV_image/Staff_1.jpg" }
        ];

        let map, currentStation = null, sidebarOpen = true, weatherCache = {};

        // ฟังก์ชันดึงข้อมูลสภาพอากาศจาก Open-Meteo API
        async function getWeatherData(lat, lng) {
            const cacheKey = `${lat.toFixed(2)},${lng.toFixed(2)}`;
            if (weatherCache[cacheKey]) {
                return weatherCache[cacheKey];
            }
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`
                );
                const data = await response.json();
                weatherCache[cacheKey] = data.current;
                return data.current;
            } catch (error) {
                console.error('Weather API error:', error);
                return null;
            }
        }

        // ฟังก์ชันแปลรหัสสภาพอากาศเป็นข้อความและ Emoji
        function getWeatherDescription(code) {
            const weatherCodes = {
                0: { emoji: '☀️', text: 'ท้องฟ้าแจ่มใส' },
                1: { emoji: '🌤️', text: 'ส่วนใหญ่แจ่มใส' },
                2: { emoji: '⛅', text: 'มีเมฆบางส่วน' },
                3: { emoji: '☁️', text: 'มีเมฆมาก' },
                45: { emoji: '🌫️', text: 'หมอก' },
                48: { emoji: '🌫️', text: 'หมอกแข็ง' },
                51: { emoji: '🌧️', text: 'ฝนเบา' },
                53: { emoji: '🌧️', text: 'ฝนปานกลาง' },
                55: { emoji: '🌧️', text: 'ฝนหนัก' },
                61: { emoji: '🌧️', text: 'ฝนเบา' },
                63: { emoji: '🌧️', text: 'ฝนปานกลาง' },
                65: { emoji: '🌧️', text: 'ฝนหนัก' },
                71: { emoji: '❄️', text: 'หิมะเบา' },
                73: { emoji: '❄️', text: 'หิมะปานกลาง' },
                75: { emoji: '❄️', text: 'หิมะหนัก' },
                77: { emoji: '❄️', text: 'เม็ดหิมะ' },
                80: { emoji: '🌧️', text: 'ฝนหลวก' },
                81: { emoji: '🌧️', text: 'ฝนหลวกหนัก' },
                82: { emoji: '🌧️', text: 'ฝนหลวกรุนแรง' },
                85: { emoji: '❄️', text: 'หิมะหลวก' },
                86: { emoji: '❄️', text: 'หิมะหลวกหนัก' },
                95: { emoji: '⛈️', text: 'พายุฟ้าคะนอง' },
                96: { emoji: '⛈️', text: 'พายุฟ้าคะนองกับลูกเห็บ' },
                99: { emoji: '⛈️', text: 'พายุฟ้าคะนองกับลูกเห็บ' }
            };
            return weatherCodes[code] || { emoji: '❓', text: 'ไม่ทราบ' };
        }

        function getImageUrl(station) {
            let url = station.img;
            // ถ้า URL เป็น HTTP ให้ใช้ Image Proxy (wsrv.nl) เพื่อแปลงเป็น HTTPS
            if (url.startsWith('http://')) {
                url = `https://wsrv.nl/?url=${encodeURIComponent(url)}`;
            }
            return `${url}?t=${Date.now()}`;
        }

        function createStationList() {
            const container = document.getElementById('station-list');
            container.innerHTML = '';
            stations.forEach(station => {
                const div = document.createElement('div');
                div.className = `glass border border-slate-600 rounded-3xl p-5 cursor-pointer hover:border-sky-400 transition-all`;
                div.innerHTML = `
                    <div class="flex gap-4">
                        <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" class="w-10 h-10">
                        <div class="flex-1">
                            <span class="font-mono text-xl text-sky-400">${station.code}</span>
                            <div class="font-medium mt-1">${station.name}</div>
                            <div class="text-xs text-slate-400 mt-2 font-mono">
                                <div>${station.lat.toFixed(5)}</div>
                                <div>${station.lng.toFixed(5)}</div>
                            </div>
                        </div>
                    </div>
                `;
                div.onclick = () => { 
                    map.flyTo([station.lat, station.lng], 16.5); 
                    openImageModal(station); 
                };
                container.appendChild(div);
            });
        }

        function updateThaiTime() {
            const now = new Date();
            const thaiYear = now.getFullYear() + 543;
            const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
            const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

            document.getElementById('thai-time').innerHTML = `
                <div class="text-lg">วัน${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${thaiYear}</div>
                <div class="text-5xl font-mono font-bold text-sky-300">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}</div>
            `;
        }

        function initMap() {
            map = L.map('map', {zoomControl: true, attributionControl: false}).setView([8.5, 99.9], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);

            const icon = L.icon({ iconUrl: 'https://i.ibb.co/4nSt8YfF/security-camera-64.png', iconSize: [48, 48], iconAnchor: [24, 45] });

            stations.forEach(station => {
                const marker = L.marker([station.lat, station.lng], {icon}).addTo(map);
                
                // สร้าง Popup ที่มีสถานะ Loading ก่อน
                const loadingPopupContent = `
                    <div style="min-width: 300px; color: #f1f5f9; font-family: 'Prompt', sans-serif;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                            <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" style="width: 24px; height: 24px;">
                            <div>
                                <div style="font-family: monospace; color: #22d3ee; font-weight: bold; font-size: 14px;">${station.code}</div>
                                <div style="font-weight: 600; font-size: 14px;">${station.name}</div>
                            </div>
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.4), rgba(15, 23, 42, 0.3)); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 12px; border: 1px solid rgba(59, 130, 246, 0.2);">
                            <div style="color: #e0f2fe; margin-bottom: 6px; font-weight: 600; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">🌡️ สภาพอากาศ:</div>
                            <div style="color: #cbd5e1; font-size: 11px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">⏳ กำลังโหลดข้อมูล...</div>
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.35), rgba(15, 23, 42, 0.25)); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 12px; border: 1px solid rgba(59, 130, 246, 0.15);">
                            <div style="color: #cbd5e1; margin-bottom: 4px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">📍 พิกัด:</div>
                            <div style="color: #bfdbfe; font-family: monospace; font-size: 11px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">${station.lat.toFixed(5)}, ${station.lng.toFixed(5)}</div>
                        </div>
                        <button onclick="openImageModal({code: '${station.code}', name: '${station.name}', lat: ${station.lat}, lng: ${station.lng}, img: '${station.img}'})" style="width: 100%; padding: 8px; background: linear-gradient(to right, #0ea5e9, #3b82f6); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">📺 ดูภาพสด</button>
                    </div>
                `;
                marker.bindPopup(loadingPopupContent, {maxWidth: 350});
                
                // ดึงข้อมูลสภาพอากาศและอัปเดต Popup เมื่อข้อมูลพร้อม
                getWeatherData(station.lat, station.lng).then(weather => {
                    let weatherHtml = '<div style="background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(7, 14, 28, 0.9)); border-radius: 12px; padding: 12px; margin-bottom: 12px; font-size: 12px; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);"><div style="color: #e0f2fe; margin-bottom: 8px; font-weight: 700; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);">🌡️ สภาพอากาศ</div>';
                    
                    if (weather) {
                        const weatherDesc = getWeatherDescription(weather.weather_code);
                        const temp = weather.temperature_2m.toFixed(1);
                        const humidity = weather.relative_humidity_2m;
                        const windSpeed = weather.wind_speed_10m.toFixed(1);
                        
                        let tempColor = '#22d3ee';
                        if (temp > 30) tempColor = '#ef4444';
                        else if (temp > 25) tempColor = '#f97316';
                        else if (temp > 20) tempColor = '#eab308';
                        else if (temp > 15) tempColor = '#22c55e';
                        
                        weatherHtml += `
                            <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.4), rgba(15, 23, 42, 0.3)); border-radius: 8px; padding: 8px; margin-bottom: 8px; border: 1px solid rgba(59, 130, 246, 0.2);">
                                <div style="color: #bfdbfe; font-size: 13px; font-weight: 600; margin-bottom: 4px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">${weatherDesc.emoji} ${weatherDesc.text}</div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.35), rgba(15, 23, 42, 0.25)); border-radius: 8px; padding: 8px; border-left: 3px solid ${tempColor}; border: 1px solid rgba(59, 130, 246, 0.15);">
                                    <div style="color: #cbd5e1; font-size: 10px; margin-bottom: 2px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">🌡️ อุณหภูมิ</div>
                                    <div style="color: ${tempColor}; font-size: 13px; font-weight: bold; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);">${temp}°C</div>
                                </div>
                                <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.35), rgba(15, 23, 42, 0.25)); border-radius: 8px; padding: 8px; border-left: 3px solid #3b82f6; border: 1px solid rgba(59, 130, 246, 0.15);">
                                    <div style="color: #cbd5e1; font-size: 10px; margin-bottom: 2px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">💨 ลม</div>
                                    <div style="color: #60a5fa; font-size: 13px; font-weight: bold; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);">${windSpeed} km/h</div>
                                </div>
                                <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.35), rgba(15, 23, 42, 0.25)); border-radius: 8px; padding: 8px; border-left: 3px solid #06b6d4; grid-column: 1 / -1; border: 1px solid rgba(59, 130, 246, 0.15);">
                                    <div style="color: #cbd5e1; font-size: 10px; margin-bottom: 2px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">💧 ความชื้น</div>
                                    <div style="display: flex; align-items: center; gap: 6px;">
                                        <div style="color: #22d3ee; font-size: 13px; font-weight: bold; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);">${humidity}%</div>
                                        <div style="flex: 1; background: rgba(6, 182, 212, 0.1); border-radius: 4px; height: 6px; overflow: hidden; border: 1px solid rgba(6, 182, 212, 0.2);">
                                            <div style="background: linear-gradient(to right, #06b6d4, #0ea5e9); height: 100%; width: ${humidity}%; box-shadow: 0 0 8px rgba(6, 182, 212, 0.4);"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        weatherHtml += '<div style="color: #cbd5e1; font-size: 11px; text-align: center; padding: 8px;">⚠️ ไม่สามารถดึงข้อมูลได้</div>';
                    }
                    weatherHtml += '</div>';
                    
                    const popupContent = `
                        <div style="min-width: 300px; color: #f1f5f9; font-family: 'Prompt', sans-serif;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                                <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" style="width: 24px; height: 24px;">
                                <div>
                                    <div style="font-family: monospace; color: #22d3ee; font-weight: bold; font-size: 14px;">${station.code}</div>
                                    <div style="font-weight: 600; font-size: 14px;">${station.name}</div>
                                </div>
                            </div>
                            ${weatherHtml}
                            <div style="background: linear-gradient(135deg, rgba(30, 58, 138, 0.35), rgba(15, 23, 42, 0.25)); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 12px; border: 1px solid rgba(59, 130, 246, 0.15);">
                                <div style="color: #cbd5e1; margin-bottom: 4px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">📍 พิกัด:</div>
                                <div style="color: #bfdbfe; font-family: monospace; font-size: 11px; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);">${station.lat.toFixed(5)}, ${station.lng.toFixed(5)}</div>
                            </div>
                            <button onclick="openImageModal({code: '${station.code}', name: '${station.name}', lat: ${station.lat}, lng: ${station.lng}, img: '${station.img}'})" style="width: 100%; padding: 8px; background: linear-gradient(to right, #0ea5e9, #3b82f6); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">📺 ดูภาพสด</button>
                        </div>
                    `;
                    marker.setPopupContent(popupContent);
                }).catch(error => {
                    console.error('Error loading weather for', station.code, error);
                });
                
                marker.on('click', () => openImageModal(station));
            });
        }

        function switchLayer(n) {
            map.eachLayer(l => { if (l instanceof L.TileLayer) map.removeLayer(l); });
            if (n === 0) {
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                document.getElementById('btn-osm').classList.add('active-layer');
                document.getElementById('btn-hybrid').classList.remove('active-layer');
            } else {
                L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);
                document.getElementById('btn-osm').classList.remove('active-layer');
                document.getElementById('btn-hybrid').classList.add('active-layer');
            }
        }

        function openImageModal(station) {
            currentStation = station;
            document.getElementById('modal-code').textContent = station.code;
            document.getElementById('modal-name').textContent = station.name;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
            document.getElementById('modal-image').src = getImageUrl(station);
        }

        function closeModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
            exitFullscreenImage();
        }

        function toggleFullscreenImage() {
            const img = document.getElementById('modal-image');
            const src = img.src;
            const overlay = document.createElement('div');
            overlay.className = 'fullscreen-overlay';
            overlay.id = 'fullscreen-overlay';
            
            const fullImg = document.createElement('img');
            fullImg.src = src;
            fullImg.alt = 'Fullscreen Image';
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'fullscreen-close';
            closeBtn.innerHTML = '×';
            closeBtn.onclick = exitFullscreenImage;
            
            overlay.appendChild(fullImg);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);
            
            // ปิด Fullscreen เมื่อคลิกที่พื้นหลัง
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    exitFullscreenImage();
                }
            });
        }

        function exitFullscreenImage() {
            const overlay = document.getElementById('fullscreen-overlay');
            if (overlay) {
                overlay.style.animation = 'fadeIn 0.3s ease reverse';
                setTimeout(() => overlay.remove(), 300);
            }
        }

        // รองรับการกดปุ่ม ESC เพื่อปิด Fullscreen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                exitFullscreenImage();
            }
        });

        function toggleMultiview() {
            const modal = document.getElementById('multiview-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            if (!modal.classList.contains('hidden')) renderMultiview();
        }

        function renderMultiview() {
            const container = document.getElementById('multiview-grid');
            container.innerHTML = '';
            
            for (let i = 0; i < 16; i++) {
                const station = stations[i];
                const div = document.createElement('div');
                div.className = `camera-frame`;
                if (station) {
                    div.innerHTML = `
                        <div class="drag-handle" title="ลากเพื่อจัดเรียง">⋮⋮</div>
                        <div class="p-1.5 border-b border-slate-700 bg-slate-950 flex-shrink-0">
                            <div class="flex items-center gap-1 mb-0.5">
                                <img src="https://i.ibb.co/4nSt8YfF/security-camera-64.png" class="w-3 h-3">
                                <span class="font-mono text-xs text-sky-400">${station.code}</span>
                            </div>
                            <span class="text-xs text-slate-400 line-clamp-1">${station.name}</span>
                        </div>
                        <div class="relative flex-1 bg-slate-900 overflow-hidden">
                            <img src="${getImageUrl(station)}" class="w-full h-full object-cover" 
                                 onerror="this.src='https://via.placeholder.com/800x450/1f2937/64748b?text=โหลดไม่ได้'">
                            <div class="absolute top-1 right-1 bg-red-600 text-white text-xs px-1.5 py-0.5 rounded flex items-center gap-1 shadow">
                                <div class="w-1 h-1 bg-white rounded-full live-dot"></div> LIVE
                            </div>
                        </div>
                    `;
                    div.onclick = () => {
                        toggleMultiview();
                        setTimeout(() => openImageModal(station), 300);
                    };
                } else {
                    div.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-600 bg-slate-900">ช่องว่าง</div>`;
                }
                container.appendChild(div);
            }

            document.getElementById('multi-time').textContent = new Date().toLocaleTimeString('th-TH');
            initSortable();
        }

        function refreshMultiview() {
            renderMultiview();
        }

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            document.getElementById('sidebar').style.width = sidebarOpen ? '288px' : '0px';
        }

        function initSortable() {
            const grid = document.getElementById('multiview-grid');
            if (!grid) return;
            
            Sortable.create(grid, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                handle: '.drag-handle',
                forceFallback: false,
                onEnd: (evt) => {
                    const items = Array.from(grid.children);
                    const newOrder = [];
                    items.forEach((item, index) => {
                        const codeElement = item.querySelector('.font-mono.text-xs.text-sky-400');
                        if (codeElement) {
                            const code = codeElement.textContent;
                            const station = stations.find(s => s.code === code);
                            if (station) newOrder.push(station);
                        }
                    });
                    stations.splice(0, newOrder.length, ...newOrder);
                    console.log('ลำดับกล้องใหม่:', stations.map(s => s.code).join(', '));
                }
            });
        }

        window.onload = () => {
            createStationList();
            initMap();
            updateThaiTime();
            setInterval(updateThaiTime, 1000);
        };


    </script>
</body>
</html>
